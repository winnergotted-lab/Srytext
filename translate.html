<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srytext - ระบบแปลภาษา</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 15px; 
            text-align: center; 
            background-color: #f8fafc; 
            color: #1e293b; 
        }
        h2 { color: #10b981; margin-bottom: 5px; font-size: 28px; }
        p { color: #64748b; font-size: 13px; margin-bottom: 25px; }
        
        /* เมนูสลับหน้า */
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .nav a { text-decoration: none; color: #64748b; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; background: #e2e8f0; transition: 0.2s; }
        .nav a.active { background: #10b981; color: white; }

        /* ตัวเลือกภาษา */
        .lang-select {
            margin-bottom: 15px;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            outline: none;
            cursor: pointer;
            background-color: #fff;
        }

        /* โครงสร้างกล่องแปลภาษาซ้าย-ขวา */
        .translator-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        @media (min-width: 768px) {
            .translator-container { grid-template-columns: 1fr 1fr; }
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            resize: none;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus { border-color: #10b981; box-shadow: 0 0 6px rgba(16, 185, 129, 0.2); }
        
        .output-box {
            width: 100%;
            height: 150px;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background-color: #ffffff;
            text-align: left;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #0f172a;
        }

        .btn-translate {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
            width: 100%;
        }
        @media (min-width: 480px) { .btn-translate { width: auto; } }
        .btn-translate:hover { background-color: #059669; }

        /* กล่องโฆษณาแบบไม่รกตา (Clean Ad Banner Space) */
        .ad-space {
            max-width: 728px;
            margin: 20px auto;
            padding: 15px;
            background-color: #f1f5f9;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }
