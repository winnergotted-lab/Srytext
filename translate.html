<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srytext - ระบบแปลภาษา</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; background-color: #f8fafc; color: #1e293b; }
        h2 { color: #10b981; margin-bottom: 5px; font-size: 28px; }
        p { color: #64748b; font-size: 13px; margin-bottom: 25px; }
        
        /* เมนูสลับหน้า */
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .nav a { text-decoration: none; color: #64748b; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; background: #e2e8f0; transition: 0.2s; }
        .nav a.active { background: #10b981; color: white; }

        /* กล่องแปลภาษา */
        .translate-box { background: white; border: 1px solid #e2e8f0; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: inline-block; min-width: 300px; }
        #google_translate_element { margin-top: 15px; padding: 10px; border: 1px dashed #10b981; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <!-- เมนูสลับหน้า -->
    <div class="nav">
        <a href="index.html">✨ อักษรพิเศษ (TH/EN)</a>
        <a href="translate.html" class="active">🌐 แปลภาษา</a>
    </div>

    <h2>Srytext Translate 🌐</h2>
    <p>เลือกภาษาที่ต้องการด้านล่างเพื่อแปลหน้าเว็บไซต์นี้เป็นภาษาอื่นๆ</p>

    <div class="translate-box">
        <h3>เครื่องมือแปลภาษา</h3>
        <p style="font-size:12px; color:#94a3b8;">คลิกปุ่มด้านล่างเพื่อเลือกภาษาที่ต้องการแปล</p>
        
        <!-- จุดวางวิดเจ็ต Google Translate -->
        <div id="google_translate_element"></div>
    </div>

    <!-- โค้ดเรียกใช้งาน Google Translate API ฟรี -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'th', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
